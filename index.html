<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard Kehidupan MA. Zuhurul Fuqohak</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      transition: all 0.4s ease;
    }

    .glass {
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .card-hover:hover {
      transform: translateY(-4px);
      transition: 0.3s;
    }

    .fade-in {
      animation: fade 0.5s ease;
    }

    @keyframes fade {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body id="body" class="bg-amber-50 text-gray-800 min-h-screen">

<div class="max-w-7xl mx-auto p-4 md:p-6">

  <!-- HEADER -->
  <div class="flex items-center justify-between mb-6">

    <div>
      <h1 class="text-3xl md:text-5xl font-bold text-amber-700">
        MA. Zuhurul Fuqohak
      </h1>

      <p class="text-gray-600 mt-1">
        Pati · Dashboard Kehidupan Premium
      </p>
    </div>

    <button
      onclick="toggleTheme()"
      class="bg-amber-400 hover:bg-amber-500 text-black px-5 py-3 rounded-2xl shadow-lg font-semibold">
      ☀️ / 🌙
    </button>

  </div>

  <!-- HERO -->
  <div
    class="glass rounded-[30px] p-8 bg-gradient-to-r from-yellow-100 to-orange-100 shadow-2xl mb-8 fade-in">

    <div class="flex items-center gap-4 mb-4">

      <div class="w-20 h-20 rounded-full bg-gradient-to-br from-yellow-400 to-orange-500 flex items-center justify-center text-3xl font-bold text-white shadow-xl">
        MZ
      </div>

      <div>
        <h2 id="greeting"
          class="text-3xl font-bold text-amber-800">
        </h2>

        <p class="text-gray-700">
          Hidup sehat, produktif, dan lebih terarah setiap hari.
        </p>
      </div>

    </div>

    <div class="mt-6">
      <p id="quote"
        class="text-xl italic text-gray-700 leading-relaxed">
      </p>
    </div>

    <div class="mt-6 text-lg font-semibold text-amber-700">
      🕒 <span id="clock"></span>
    </div>

  </div>

  <!-- STATS -->
  <div class="grid md:grid-cols-4 gap-5 mb-8">

    <div class="bg-white rounded-3xl p-6 shadow-xl card-hover">
      <p class="text-gray-500 mb-2">🔥 Total Kalori</p>
      <h2 id="totalCalories"
        class="text-4xl font-bold text-orange-500">
        0
      </h2>
    </div>

    <div class="bg-white rounded-3xl p-6 shadow-xl card-hover">
      <p class="text-gray-500 mb-2">🍗 Protein</p>
      <h2 id="totalProtein"
        class="text-4xl font-bold text-blue-500">
        0g
      </h2>
    </div>

    <div class="bg-white rounded-3xl p-6 shadow-xl card-hover">
      <p class="text-gray-500 mb-2">💧 Air Minum</p>
      <h2 id="totalWater"
        class="text-4xl font-bold text-cyan-500">
        0 ml
      </h2>
    </div>

    <div class="bg-white rounded-3xl p-6 shadow-xl card-hover">
      <p class="text-gray-500 mb-2">🍱 Jumlah Makanan</p>
      <h2 id="mealCount"
        class="text-4xl font-bold text-green-500">
        0
      </h2>
    </div>

  </div>

  <!-- INSIGHT -->
  <div id="insight"
    class="rounded-3xl p-6 bg-gradient-to-r from-yellow-100 to-orange-100 shadow-xl text-lg font-semibold mb-8">
    Memuat insight AI...
  </div>

  <!-- LIST -->
  <div class="mb-4 flex items-center justify-between">

    <h2 class="text-3xl font-bold">
      Riwayat Makanan
    </h2>

    <div class="text-green-600 font-semibold">
      ● Live
    </div>

  </div>

  <!-- MEALS -->
  <div id="mealsContainer"
    class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">

    <!-- render -->

  </div>

</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycby1TvnrsDXFlUdGP9OF_liECGm8wM3FNG3U-GbyniTHY4GbWMbtRat4auusV2Rlh2QUyQ/exec?action=getMeals";

const quotes = [
  "Disiplin kecil setiap hari akan mengubah masa depan besar.",
  "Tubuh sehat membantu hati lebih kuat dalam ibadah.",
  "Hari ini adalah kesempatan memperbaiki diri.",
  "Konsistensi lebih penting daripada semangat sesaat.",
  "Jaga kesehatan agar hidup lebih berkah.",
  "Hidup hebat dibangun dari kebiasaan kecil yang istiqomah.",
  "Semangat hari ini menentukan masa depan nanti."
];

function setGreeting() {

  const hour = new Date().getHours();

  let text = "Selamat malam";

  if (hour >= 4 && hour < 11) {
    text = "Selamat pagi";
  }
  else if (hour >= 11 && hour < 15) {
    text = "Selamat siang";
  }
  else if (hour >= 15 && hour < 18) {
    text = "Selamat sore";
  }

  document.getElementById("greeting").innerText =
    `${text}, MA. Zuhurul Fuqohak`;
}

function setQuote() {

  const q =
    quotes[Math.floor(Math.random() * quotes.length)];

  document.getElementById("quote").innerText =
    `"${q}"`;
}

function updateClock() {

  const now = new Date();

  document.getElementById("clock").innerText =
    now.toLocaleString("id-ID", {
      dateStyle: "full",
      timeStyle: "medium"
    });
}

async function loadMeals() {

  try {

    const response = await fetch(API_URL);

    const json = await response.json();

    console.log(json);

    const rows = json.data;

    if (!rows || rows.length < 2) {

      document.getElementById("mealsContainer").innerHTML = `
        <div class="bg-white p-10 rounded-3xl shadow-xl text-center col-span-full">
          Belum ada data makanan hari ini.
        </div>
      `;

      return;
    }

    const headers = rows[0];

    const meals = rows.slice(1).map(row => {

      let obj = {};

      headers.forEach((header, index) => {
        obj[header] = row[index];
      });

      return obj;
    });

    renderMeals(meals);
    renderStats(meals);
    renderInsight(meals);

  } catch (err) {

    console.error(err);

    document.getElementById("mealsContainer").innerHTML = `
      <div class="bg-red-100 text-red-700 p-10 rounded-3xl shadow-xl text-center col-span-full">
        Gagal mengambil data dashboard.
      </div>
    `;
  }
}

function renderMeals(meals) {

  const container =
    document.getElementById("mealsContainer");

  container.innerHTML =
    meals.reverse().map(meal => `

      <div class="bg-white rounded-[30px] overflow-hidden shadow-2xl card-hover fade-in">

        ${
          meal.image_url
          ?
          `<img src="${meal.image_url}"
            class="w-full h-56 object-cover">`
          :
          `<div class="w-full h-56 bg-yellow-100 flex items-center justify-center text-6xl">
            🍱
          </div>`
        }

        <div class="p-6">

          <h3 class="text-3xl font-bold text-amber-700 mb-3">
            ${meal.food_detected || '-'}
          </h3>

          <div class="space-y-2 text-lg">

            <p>🔥 Kalori:
              <span class="font-semibold">
                ${meal.calories || 0}
              </span>
            </p>

            <p>🍗 Protein:
              <span class="font-semibold">
                ${meal.protein || 0} g
              </span>
            </p>

            <p>🥤 Minuman:
              <span class="font-semibold">
                ${meal.drink_detected || '-'}
              </span>
            </p>

            <p>💧 Air:
              <span class="font-semibold">
                ${meal.water_ml || 0} ml
              </span>
            </p>

            <p class="text-gray-500 text-base pt-2">
              📅 ${meal.date || '-'}
            </p>

          </div>

        </div>

      </div>

    `).join("");
}

function renderStats(meals) {

  let calories = 0;
  let protein = 0;
  let water = 0;

  meals.forEach(meal => {

    calories += Number(meal.calories || 0);
    protein += Number(meal.protein || 0);
    water += Number(meal.water_ml || 0);

  });

  document.getElementById("totalCalories")
    .innerText = calories;

  document.getElementById("totalProtein")
    .innerText = protein + "g";

  document.getElementById("totalWater")
    .innerText = water + " ml";

  document.getElementById("mealCount")
    .innerText = meals.length;
}

function renderInsight(meals) {

  let calories = 0;
  let protein = 0;
  let water = 0;

  meals.forEach(meal => {

    calories += Number(meal.calories || 0);
    protein += Number(meal.protein || 0);
    water += Number(meal.water_ml || 0);

  });

  let text = "Kondisi harian cukup baik.";

  if (water < 1500) {
    text = "💧 Hidrasi hari ini masih kurang.";
  }

  if (protein < 50) {
    text = "🍗 Protein harian masih rendah.";
  }

  if (calories > 2500) {
    text = "🔥 Kalori hari ini cukup tinggi.";
  }

  document.getElementById("insight").innerText =
    text;
}

function toggleTheme() {

  const body =
    document.getElementById("body");

  if (body.classList.contains("bg-amber-50")) {

    body.className =
      "bg-slate-950 text-white min-h-screen";

  } else {

    body.className =
      "bg-amber-50 text-gray-800 min-h-screen";
  }
}

setGreeting();
setQuote();
updateClock();

setInterval(updateClock, 1000);

loadMeals();

setInterval(loadMeals, 30000);

</script>

</body>
</html>
